<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo -->
  <rect width="512" height="512" rx="112" fill="#0d1a14"/>

  <!-- Halo sutil alrededor de la cabeza -->
  <circle cx="256" cy="118" r="68" fill="#5ba888" opacity="0.15"/>

  <!-- Cabeza (sólida) -->
  <circle cx="256" cy="118" r="52" fill="#5ba888"/>

  <!-- Brazo izquierdo alzado (elipse rotada, forma sólida) -->
  <ellipse cx="174" cy="186" rx="24" ry="80" fill="#5ba888" transform="rotate(-38 174 186)"/>

  <!-- Brazo derecho alzado (elipse rotada, espejo) -->
  <ellipse cx="338" cy="186" rx="24" ry="80" fill="#5ba888" transform="rotate(38 338 186)"/>

  <!-- Torso -->
  <path d="M 200 195 Q 196 285 200 320 L 312 320 Q 316 285 312 195 Q 285 182 256 182 Q 227 182 200 195 Z" fill="#5ba888"/>

  <!-- Cadera -->
  <ellipse cx="256" cy="322" rx="60" ry="22" fill="#5ba888"/>

  <!-- Pierna izquierda -->
  <path d="M 210 332 Q 200 375 188 428 L 228 428 Q 238 378 244 332 Z" fill="#5ba888" rx="12"/>

  <!-- Pierna derecha -->
  <path d="M 302 332 Q 316 375 324 428 L 284 428 Q 274 378 268 332 Z" fill="#5ba888" rx="12"/>

  <!-- Pequeño acento de luz: reflejo en la cabeza -->
  <circle cx="240" cy="104" r="14" fill="white" opacity="0.12"/>
</svg>
